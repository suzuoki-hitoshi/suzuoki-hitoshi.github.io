<head>

  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <meta name="twitter:title" content="鈴置ひとし｜東海市議会議員選挙 立候補者" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#6da886;
      --card:#ffffff;
      --soft:#ffffff;
      --festival-bg:#eef6f1;
      --text:#111111;
      --muted:#555555;
      --line:#6da886;
      --btn:#6da886;
      --btn2:#5f9879;
      --btn-text:#ffffff;
      --heading:#4f8f6e;
      --subtext:#4f6b59;
      --shadow:0 14px 40px rgba(0,0,0,.08);
      --max:640px;
      --r:18px;
    }

    *{
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
      font-feature-settings:"palt";
      background:var(--bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      line-height:1.85;
    }

    .wrap{
      width:100%;
      padding:22px 14px 40px;
    }

    .card{
      width:min(var(--max), 100%);
      margin:0 auto;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:calc(var(--r) + 8px);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .hero{
      padding:42px 20px 30px;
      text-align:center;
      background:var(--card);
    }

    .avatar{
      width:140px;
      height:140px;
      border-radius:999px;
      object-fit:cover;
      border:none;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
      background:#f0f0f0;
      display:block;
      margin:0 auto 18px;
    }

    h1{
      margin:0;
      font-size:clamp(32px, 5vw, 42px);
      font-weight:900;
      letter-spacing:.03em;
      line-height:1.15;
      color:#111111;
    }

    .sub{
      margin:10px 0 0;
      color:#111111;
      font-size:14px;
      font-weight:500;
      line-height:1.7;
    }

    .sns{
      margin-top:22px;
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .sns-btn{
      width:56px;
      height:56px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:var(--btn);
      border:1px solid var(--btn);
      color:#ffffff;
      text-decoration:none;
      transition:transform .14s ease, background .14s ease, border-color .14s ease, box-shadow .14s ease;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
    }

    .sns-btn:hover{
      transform:translateY(-2px);
      background:var(--btn2);
      border-color:var(--btn2);
      box-shadow:0 12px 24px rgba(0,0,0,.12);
    }

    .sns-btn:active{
      transform:translateY(0);
    }

    .sns-btn svg{
      width:26px;
      height:26px;
      display:block;
      fill:currentColor;
    }

    .divider{
      height:1px;
      background:var(--line);
      margin:0 20px;
    }

    .section{
      padding:36px 22px;
      text-align:center;
      background:var(--card);
    }

    .title{
      margin:0 0 10px;
      font-size:clamp(22px, 3.8vw, 30px);
      font-weight:900;
      line-height:1.45;
      letter-spacing:.02em;
      color:var(--heading);
    }

    .message{
      margin:0;
      color:#444444;
      font-size:15px;
      line-height:1.95;
      white-space:pre-line;
    }

    .video-box{
      max-width:520px;
      margin:0 auto;
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      background:#000;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
    }

    .video-placeholder{
      aspect-ratio:16 / 9;
      display:grid;
      place-items:center;
      color:rgba(255,255,255,.78);
      background:#111;
      font-size:15px;
      padding:16px;
      text-align:center;
    }

    .festival{
      background:var(--festival-bg);
      border:1px solid var(--line);
      border-radius:16px;
      padding:22px;
      margin-top:18px;
      text-align:left;
    }

    .festival h3{
      margin:0 0 18px;
      font-size:20px;
      line-height:1.65;
      text-align:center;
      color:var(--heading);
      font-weight:800;
    }

    .festival-grid{
      display:grid;
      gap:16px;
      margin-top:6px;
      text-align:left;
    }

    .festival-row + .festival-row{
      margin-top:0;
    }

    .festival .label{
      display:block;
      font-weight:800;
      color:var(--heading);
      margin-bottom:4px;
    }

    .festival .value{
      color:var(--muted);
      white-space:pre-line;
      line-height:1.85;
    }

    .schedule-wrap{
      display:grid;
      gap:16px;
      margin-top:18px;
      text-align:left;
    }

    .schedule-card{
      background:var(--soft);
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
    }

    .schedule-card h3{
      margin:0 0 12px;
      font-size:18px;
      line-height:1.65;
      color:var(--heading);
      font-weight:800;
    }

    .schedule-row + .schedule-row{
      margin-top:12px;
    }

    .label{
      display:block;
      font-weight:800;
      color:var(--heading);
      margin-bottom:4px;
    }

    .value{
      color:var(--muted);
      white-space:pre-line;
      line-height:1.85;
    }

    .vote-day{
      margin-top:24px;
      text-align:center;
      color:#000;
      font-weight:900;
      font-size:clamp(18px, 3vw, 22px);
      line-height:1.45;
    }

    .share-buttons,
    .cta{
      margin-top:18px;
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px;
    }

    .share-btn{
      appearance:none;
      border:none;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:132px;
      padding:12px 16px;
      border-radius:999px;
      background:var(--btn);
      border:1px solid var(--btn);
      color:var(--btn-text);
      text-decoration:none;
      font-weight:700;
      font-size:14px;
      transition:transform .14s ease, background .14s ease, border-color .14s ease, box-shadow .14s ease;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
    }

    .share-btn:hover{
      transform:translateY(-2px);
      background:var(--btn2);
      border-color:var(--btn2);
      box-shadow:0 12px 24px rgba(0,0,0,.12);
    }

    .cta a{
      appearance:none;
      border:none;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:160px;
      padding:14px 18px;
      border-radius:999px;
      background:var(--btn);
      border:1px solid var(--btn);
      color:var(--btn-text);
      text-decoration:none;
      font-weight:700;
      font-size:14px;
      transition:transform .14s ease, opacity .14s ease, box-shadow .14s ease, background .14s ease, border-color .14s ease;
      box-shadow:0 10px 24px rgba(0,0,0,.12);
    }

    .cta a:hover{
      transform:translateY(-2px);
      background:var(--btn2);
      border-color:var(--btn2);
      opacity:1;
    }

    .bottom-nav{
      padding:22px 22px 26px;
      text-align:center;
      background:var(--card);
    }

    .back-top{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 18px;
      border-radius:999px;
      border:1px solid var(--btn);
      background:var(--btn);
      color:var(--btn-text);
      text-decoration:none;
      font-weight:700;
      transition:transform .14s ease, background .14s ease, border-color .14s ease, box-shadow .14s ease;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
    }

    .back-top:hover{
      transform:translateY(-2px);
      background:var(--btn2);
      border-color:var(--btn2);
      box-shadow:0 12px 24px rgba(0,0,0,.12);
    }

    footer{
      padding:0 22px 22px;
      text-align:center;
      font-size:12px;
      color:var(--subtext);
      background:var(--card);
    }

    @media (max-width:360px){
      .sns-btn{
        width:54px;
        height:54px;
      }

      .sns-btn svg{
        width:24px;
        height:24px;
      }
    }
  </style>
</head>
